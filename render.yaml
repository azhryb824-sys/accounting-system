services:
  - type: web
    name: accounting-ai-service
    env: docker
    rootDir: accounting_ai_service
    healthCheckPath: /health
    envVars:
      - key: ACCOUNTING_AI_BACKEND
        value: local_model
      - key: REQUIRE_LOCAL_MODEL
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
