services:
  - type: web
    name: accounting-ai-service
    env: docker
    rootDir: accounting_ai_service
    dockerfilePath: ./Dockerfile
    dockerCommand: sh render-start.sh
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: ACCOUNTING_AI_BACKEND
        value: auto
      - key: REQUIRE_LOCAL_MODEL
        value: "false"
      - key: LOCAL_ANALYSIS_ONLY
        value: "false"
      - key: ENABLE_OPEN_WEB_SEARCH
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
