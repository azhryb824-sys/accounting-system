{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-4">{{ title }}</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <h4 class="mt-4">الأصناف</h4>

        <table class="table table-bordered" id="items-table">
            <thead class="table-dark">
                <tr>
                    <th>الصنف</th>
                    <th>الكمية</th>
                    <th>السعر</th>
                    <th>إزالة</th>
                </tr>
            </thead>
            <tbody id="items-body">
                <tr>
                    <td>
                        <select name="item_id" class="form-select">
                            {% for item in items %}
                                <option value="{{ item.id }}">{{ item.name }}</option>
                            {% endfor %}
                        </select>
                    </td>
                    <td><input type="number" name="quantity" class="form-control" step="0.01"></td>
                    <td><input type="number" name="price" class="form-control" step="0.01"></td>
                    <td><button type="button" class="btn btn-danger remove-row">حذف</button></td>
                </tr>
            </tbody>
        </table>

        <button type="button" id="add-row" class="btn btn-secondary">إضافة صنف</button>
        <br><br>

        <button type="submit" class="btn btn-success">حفظ</button>
        <a href="{% url 'purchase_list' %}" class="btn btn-secondary">رجوع</a>
    </form>
</div>

<script>
document.getElementById("add-row").addEventListener("click", function () {
    let row = `
        <tr>
            <td>
                <select name="item_id" class="form-select">
                    {% for item in items %}
                        <option value="{{ item.id }}">{{ item.name }}</option>
                    {% endfor %}
                </select>
            </td>
            <td><input type="number" name="quantity" class="form-control" step="0.01"></td>
            <td><input type="number" name="price" class="form-control" step="0.01"></td>
            <td><button type="button" class="btn btn-danger remove-row">حذف</button></td>
        </tr>
    `;
    document.getElementById("items-body").insertAdjacentHTML("beforeend", row);
});

document.addEventListener("click", function (e) {
    if (e.target.classList.contains("remove-row")) {
        e.target.closest("tr").remove();
    }
});
</script>
{% endblock %}
