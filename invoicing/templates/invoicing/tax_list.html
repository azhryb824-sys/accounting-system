{% extends 'core/base.html' %}

{% block title %}الضرائب{% endblock %}

{% block content %}
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>الضرائب</h2>
        <a href="{% url 'tax_create' %}" class="btn btn-primary">إضافة ضريبة</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>اسم الضريبة</th>
                <th>النسبة</th>
                <th>إجراءات</th>
            </tr>
        </thead>

        <tbody>
            {% for tax in taxes %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ tax.name }}</td>
                <td>{{ tax.rate }}%</td>
                <td>
                    <a href="{% url 'tax_edit' tax.id %}" class="btn btn-sm btn-warning">تعديل</a>
                    <a href="{% url 'tax_delete' tax.id %}" class="btn btn-sm btn-danger"
                       onclick="return confirm('هل أنت متأكد من الحذف؟')">حذف</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center text-muted">لا توجد ضرائب</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
{% endblock %}
