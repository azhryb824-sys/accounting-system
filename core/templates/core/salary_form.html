{% extends 'core/base.html' %}

{% block page_title %}{{ title }}{% endblock %}
{% block page_subtitle %}إضافة مسير راتب وربطه محاسبياً عند الاعتماد{% endblock %}

{% block content %}
<div class="container-fluid"><div class="glass-card p-4">
    <form method="post">{% csrf_token %}
        <div class="row g-3">{% for field in form %}<div class="{% if field.name == 'note' %}col-12{% else %}col-md-6{% endif %}"><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{{ field.errors }}</div>{% endfor %}</div>
        <div class="d-flex justify-content-between mt-4"><a class="btn btn-outline-light" href="{% url 'salary_list' %}">رجوع</a><button class="btn btn-primary">حفظ الراتب</button></div>
    </form>
</div></div>
{% endblock %}
